<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heitor 1º Aninho</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Cabeçalho -->
    <header class="header">
        <h1>Heitor</h1>
        <p>1 aninho de alegria! 🎂</p>
    </header>

    <!-- Carrossel de Fotos -->
    <section class="carousel">
        <div class="slide-container">
            <img class="slide active" src="foto1.jpg" alt="Foto 1">
            <img class="slide" src="foto2.jpg" alt="Foto 2">
            <img class="slide" src="foto3.jpg" alt="Foto 3">
        </div>
        <button class="prev" onclick="prevSlide()">❮</button>
        <button class="next" onclick="nextSlide()">❯</button>
    </section>

    <!-- Detalhes do Evento -->
    <section class="details">
        <h2>Detalhes da Festa</h2>
        <p><strong>Data:</strong> 01 de Janeiro de 2026</p>
        <p><strong>Horário:</strong> 15h</p>
        <p><strong>Local:</strong> [Seu endereço]</p>
    </section>

    <!-- Confirmação -->
    <section class="rsvp">
        <h2>Confirme sua Presença</h2>
        <a href="https://wa.me/5511999999999?text=Confirmo%20presença%20na%20festa%20do%20Heitor!" class="btn-whatsapp">
            Confirmar via WhatsApp
        </a>
    </section>

    <!-- Rodapé -->
    <footer>
        <p>Feito com ❤️ para o Heitor</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
